<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My GitHub Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .loader {
            border-top-color: #3b82f6;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans">

    <div id="loading" class="fixed inset-0 bg-gray-950 flex flex-col items-center justify-center z-50">
        <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-700 h-12 w-12 mb-4"></div>
        <p class="text-gray-400 animate-pulse">Fetching GitHub data...</p>
    </div>

    <div class="max-w-5xl mx-auto px-4 py-8 hidden" id="content">
        
        <header class="bg-gray-800 rounded-2xl p-6 md:p-8 shadow-xl border border-gray-700 flex flex-col md:flex-row items-center gap-6 mb-8">
            <img id="avatar" class="w-32 h-32 md:w-40 md:h-40 rounded-full border-4 border-blue-500 shadow-lg" src="" alt="Profile Avatar">
            <div class="flex-1 text-center md:text-left">
                <h1 id="name" class="text-3xl md:text-4xl font-bold text-white mb-2"></h1>
                <p id="username" class="text-blue-400 font-mono text-lg mb-3"></p>
                <p id="bio" class="text-gray-300 max-w-2xl mb-4 text-sm md:text-base"></p>
                
                <div class="flex flex-wrap justify-center md:justify-start gap-4 text-xs md:text-sm text-gray-400">
                    <span id="location-container" class="hidden"><i class="fa-solid fa-location-dot mr-1"></i> <span id="location"></span></span>
                    <span id="blog-container" class="hidden"><i class="fa-solid fa-link mr-1"></i> <a id="blog" href="#" target="_blank" class="hover:text-blue-400 transition"></a></span>
                    <span id="twitter-container" class="hidden"><i class="fa-brands fa-x-twitter mr-1"></i> <a id="twitter" href="#" target="_blank" class="hover:text-blue-400 transition"></a></span>
                </div>
            </div>
            <div class="flex md:flex-col gap-3 justify-center bg-gray-850 p-4 rounded-xl border border-gray-700 w-full md:w-auto">
                <div class="text-center px-4">
                    <span id="followers" class="block text-xl font-bold text-white">0</span>
                    <span class="text-xs text-gray-400 uppercase tracking-wider">Followers</span>
                </div>
                <div class="border-r md:border-r-0 md:border-b border-gray-700 my-1"></div>
                <div class="text-center px-4">
                    <span id="public-repos" class="block text-xl font-bold text-white">0</span>
                    <span class="text-xs text-gray-400 uppercase tracking-wider">Public Repos</span>
                </div>
            </div>
        </header>

        <main>
            <h2 class="text-2xl font-bold text-white mb-6 flex items-center gap-2">
                <i class="fa-solid fa-book-bookmark text-blue-500"></i> Repositories
            </h2>
            <div id="repo-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                </div>
        </main>

        <footer class="mt-12 text-center text-xs text-gray-500 border-t border-gray-800 pt-6">
            <p>Powered by the GitHub API. Built with Tailwind CSS.</p>
        </footer>
    </div>

    <script>
        // CONFIGURATION: Put your GitHub Username here
        const GITHUB_USERNAME = 'eendroroy'; 

        async function fetchGitHubProfile() {
            const loadingEl = document.getElementById('loading');
            const contentEl = document.getElementById('content');
            
            try {
                // Fetch User Info & Repos in parallel
                const [userResponse, reposResponse] = await Promise.all([
                    fetch(`https://api.github.com/users/${GITHUB_USERNAME}`),
                    fetch(`https://api.github.com/users/${GITHUB_USERNAME}/repos?sort=updated&per_page=8`)
                ]);

                if (!userResponse.ok || !reposResponse.ok) {
                    throw new Error('Failed to fetch data from GitHub API');
                }

                const userData = await userResponse.json();
                const reposData = await reposResponse.json();

                // 1. Populate Profile Card
                document.getElementById('avatar').src = userData.avatar_url;
                document.getElementById('name').textContent = userData.name || GITHUB_USERNAME;
                document.getElementById('username').textContent = `@${userData.login}`;
                document.getElementById('bio').textContent = userData.bio || "No bio available.";
                document.getElementById('followers').textContent = userData.followers;
                document.getElementById('public-repos').textContent = userData.public_repos;

                // Optional Fields Check
                if(userData.location) {
                    document.getElementById('location').textContent = userData.location;
                    document.getElementById('location-container').classList.remove('hidden');
                }
                if(userData.blog) {
                    const blogLink = document.getElementById('blog');
                    blogLink.href = userData.blog.startsWith('http') ? userData.blog : `https://${userData.blog}`;
                    blogLink.textContent = userData.blog.replace(/(^\w+:|^)\/\//, ''); // Clean URL look
                    document.getElementById('blog-container').classList.remove('hidden');
                }
                if(userData.twitter_username) {
                    const twitterLink = document.getElementById('twitter');
                    twitterLink.href = `https://twitter.com/${userData.twitter_username}`;
                    twitterLink.textContent = `@${userData.twitter_username}`;
                    document.getElementById('twitter-container').classList.remove('hidden');
                }

                // 2. Populate Repositories Grid
                const repoGrid = document.getElementById('repo-grid');
                repoGrid.innerHTML = ''; // Clear fallback

                // Filter out forks so it shows your actual work
                const sourceRepos = reposData.filter(repo => !repo.fork);

                sourceRepos.forEach(repo => {
                    const repoCard = document.createElement('a');
                    repoCard.href = repo.html_url;
                    repoCard.target = "_blank";
                    repoCard.className = "bg-gray-800 hover:bg-gray-750 border border-gray-700 hover:border-blue-500 rounded-xl p-5 shadow-md transition duration-200 group flex flex-col justify-between";

                    repoCard.innerHTML = `
                        <div>
                            <div class="flex items-center justify-between mb-2">
                                <h3 class="text-lg font-semibold text-white group-hover:text-blue-400 transition truncate max-w-[80%]">
                                    ${repo.name}
                                </h3>
                                <span class="text-xs bg-gray-700 text-gray-300 px-2 py-0.5 rounded-full border border-gray-600">
                                    ${repo.private ? 'Private' : 'Public'}
                                </span>
                            </div>
                            <p class="text-sm text-gray-400 line-clamp-2 mb-4">
                                ${repo.description || 'No description provided.'}
                            </p>
                        </div>
                        <div class="flex items-center gap-4 text-xs text-gray-400">
                            ${repo.language ? `
                                <span class="flex items-center gap-1.5">
                                    <span class="w-3 h-3 rounded-full bg-blue-500"></span>
                                    ${repo.language}
                                </span>
                            ` : ''}
                            <span class="flex items-center gap-1">
                                <i class="fa-regular fa-star"></i> ${repo.stargazers_count}
                            </span>
                            <span class="flex items-center gap-1">
                                <i class="fa-solid fa-code-fork"></i> ${repo.forks_count}
                            </span>
                        </div>
                    `;
                    repoGrid.appendChild(repoCard);
                });

                // Reveal layout, hide loader
                loadingEl.classList.add('hidden');
                contentEl.classList.remove('hidden');

            } catch (error) {
                console.error(error);
                loadingEl.innerHTML = `
                    <div class="text-center p-6">
                        <i class="fa-solid fa-circle-exclamation text-red-500 text-4xl mb-3"></i>
                        <p class="text-white font-semibold">Oops! Something went wrong.</p>
                        <p class="text-sm text-gray-400 mt-1">Make sure your username config is correct or try again later.</p>
                    </div>
                `;
            }
        }

        // Run on load
        fetchGitHubProfile();
    </script>
</body>
</html>
